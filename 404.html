<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · Chibi Creator</title>
  <meta name="theme-color" content="#FFB6C1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #FFF5E6 0%, #FFE8E0 30%, #E8F4FD 70%, #FFF0F5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,182,193,0.3);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      box-shadow: 0 16px 48px rgba(255,182,193,0.2);
    }
    .chibi { font-size: 80px; margin-bottom: 8px; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .code { font-size: 72px; font-weight: 800; color: #FFB6C1; line-height: 1; margin-bottom: 4px; }
    h1 { font-size: 24px; font-weight: 700; color: #2D2D3F; margin-bottom: 12px; }
    p  { font-size: 15px; color: #6B6B8D; line-height: 1.6; margin-bottom: 28px; }
    a.btn {
      display: inline-block;
      background: linear-gradient(135deg, #FFB6C1, #FF9AAB);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(255,154,171,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    a.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,154,171,0.5); }
    .sparkles { font-size: 18px; margin-top: 20px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="chibi">🥺</div>
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>Oops! This chibi wandered off and we can't find the page you're looking for. Let's head back to the studio!</p>
    <a href="index.html" class="btn">✨ Back to Chibi Creator</a>
    <div class="sparkles">✨ 🌸 ✨ 🌟 ✨</div>
  </div>
</body>
</html>
